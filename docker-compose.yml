services:
  db:
    image: postgres:15-alpine
    container_name: handsomew-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: handsomew_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d handsomew_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: handsomew-agent-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "false"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/handsomew_agent
      CORS_ALLOW_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: handsomew-agent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:

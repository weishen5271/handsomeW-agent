<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI Agent Chat</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #d9e1ee;
      --text: #1a2533;
      --muted: #5b6b81;
      --user: #dff1ff;
      --assistant: #eef6e6;
      --accent: #1967d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(120deg, #eef3ff, #f8fbff 45%, #edf8f2);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 12px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 5px 16px rgba(23, 43, 77, 0.08);
    }

    .panel {
      padding: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: 650;
      margin: 0 0 10px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    select, input, textarea, button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 8px;
    }

    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #history {
      height: 55vh;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
    }

    .msg {
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user { background: var(--user); }
    .assistant { background: var(--assistant); }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    #stream {
      height: 73vh;
      overflow-y: auto;
      padding: 10px;
      background: #121826;
      color: #dce7ff;
      border-radius: 8px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .footer {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      #history, #stream {
        height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card panel">
      <h1 class="title">Agent 问答界面</h1>
      <div class="toolbar">
        <label>
          Agent:
          <select id="agentType">
            <option value="simple">simple</option>
            <option value="react">react</option>
            <option value="loop">loop</option>
          </select>
        </label>
        <input id="systemPrompt" placeholder="可选 system_prompt" style="flex: 1; min-width: 180px;" />
      </div>

      <div id="history"></div>

      <div style="margin-top: 10px;">
        <textarea id="input" placeholder="输入你的问题，然后点击发送"></textarea>
        <div class="footer">
          <button id="sendBtn">发送 (Stream)</button>
          <button id="clearBtn" type="button">清空历史</button>
        </div>
      </div>
    </section>

    <aside class="card panel">
      <h2 class="title">实时 Stream 日志</h2>
      <div id="stream"></div>
    </aside>
  </div>

  <script>
    const historyEl = document.getElementById('history');
    const streamEl = document.getElementById('stream');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const agentTypeEl = document.getElementById('agentType');
    const systemPromptEl = document.getElementById('systemPrompt');

    const chatHistory = [];

    function appendMessage(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role}`;

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = role === 'user' ? '用户' : '助手';

      const text = document.createElement('div');
      text.textContent = content || '';

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      historyEl.appendChild(wrapper);
      historyEl.scrollTop = historyEl.scrollHeight;

      return text;
    }

    function appendStream(eventType, payload) {
      const line = `[${new Date().toLocaleTimeString()}] ${eventType}: ${JSON.stringify(payload, null, 2)}\n`;
      streamEl.textContent += line;
      streamEl.scrollTop = streamEl.scrollHeight;
    }

    function setLoading(loading) {
      sendBtn.disabled = loading;
      inputEl.disabled = loading;
      agentTypeEl.disabled = loading;
      systemPromptEl.disabled = loading;
    }

    function parseSSEBlock(block) {
      const lines = block.split('\n');
      let eventType = 'message';
      const dataLines = [];

      for (const line of lines) {
        if (line.startsWith('event:')) {
          eventType = line.slice(6).trim();
        }
        if (line.startsWith('data:')) {
          dataLines.push(line.slice(5).trim());
        }
      }

      let payload = {};
      const rawData = dataLines.join('\n');
      if (rawData) {
        try {
          payload = JSON.parse(rawData);
        } catch (_) {
          payload = { raw: rawData };
        }
      }

      return { eventType, payload };
    }

    async function sendStream() {
      const input = inputEl.value.trim();
      if (!input) return;

      appendMessage('user', input);
      chatHistory.push({ role: 'user', content: input });

      const assistantNode = appendMessage('assistant', '');
      let assistantText = '';

      setLoading(true);

      try {
        const agentType = agentTypeEl.value;
        const body = {
          input,
          history: chatHistory,
          system_prompt: systemPromptEl.value.trim() || null
        };

        const response = await fetch(`/agents/${agentType}/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!response.ok || !response.body) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';

          for (const part of parts) {
            if (!part.trim()) continue;

            const { eventType, payload } = parseSSEBlock(part);
            appendStream(eventType, payload);

            if (eventType === 'assistant' && payload.content) {
              if (assistantText) {
                assistantText += '\n\n';
              }
              assistantText += payload.content;
              assistantNode.textContent = assistantText;
            }

            if (eventType === 'done' && payload.content) {
              assistantText = payload.content;
              assistantNode.textContent = assistantText;
            }

            if (eventType === 'error') {
              assistantNode.textContent = `错误: ${payload.message || '未知错误'}`;
            }
          }
        }

        chatHistory.push({ role: 'assistant', content: assistantNode.textContent || '' });
        inputEl.value = '';
      } catch (error) {
        appendStream('client_error', { message: error.message || String(error) });
      } finally {
        setLoading(false);
      }
    }

    clearBtn.addEventListener('click', () => {
      chatHistory.length = 0;
      historyEl.innerHTML = '';
      streamEl.textContent = '';
    });

    sendBtn.addEventListener('click', sendStream);
    inputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
        sendStream();
      }
    });
  </script>
</body>
</html>

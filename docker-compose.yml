services:
  db:
    image: postgres:15-alpine
    container_name: handsomew-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: handsomew_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d handsomew_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: backend/ai-service/Dockerfile
    container_name: handsomew-agent-ai-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "false"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/handsomew_agent
      CORS_ALLOW_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: models
      MINIO_SECURE: "false"
      MINIO_USE_PRESIGNED_URL: "false"
    ports:
      - "8000:8000"

  system-service:
    build:
      context: .
      dockerfile: backend/system-service/Dockerfile
    container_name: handsomew-agent-system-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      AI_SERVICE_BASE_URL: http://ai-service:8000
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/handsomew_agent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"

  minio:
    image: minio/minio:latest
    container_name: handsomew-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: handsomew-agent-frontend
    restart: unless-stopped
    depends_on:
      - ai-service
      - system-service
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
